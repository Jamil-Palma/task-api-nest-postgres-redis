name: CI - Task Management API

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main]

jobs:
    test-e2e:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:15-alpine
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: task_manager_test
                ports:
                    - 5433:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 10

            redis:
                image: redis:7-alpine
                ports:
                    - 6379:6379
                options: >-
                    --health-cmd "redis-cli ping"
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Run E2E Tests
              run: npm run test:e2e
              env:
                  NODE_ENV: test
                  DB_HOST: localhost
                  DB_PORT: 5433
                  DB_USERNAME: postgres
                  DB_PASSWORD: postgres
                  DB_DATABASE: task_manager_test
                  REDIS_HOST: localhost
                  REDIS_PORT: 6379
                  JWT_SECRET: super_secret_ci_key
                  JWT_EXPIRES_IN: 1h
